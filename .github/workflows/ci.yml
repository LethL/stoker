name: CI

on:
  push:
  pull_request:

jobs:
  # ── Python-агент: lint + format + типы + тесты ──────────────
  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"
          working-directory: agent
      - run: uv sync --frozen
      - run: uv run --frozen ruff check
      - run: uv run --frozen ruff format --check
      - run: uv run --frozen mypy
      - run: uv run --frozen pytest

  # ── Python-сервер: lint + format + типы + тесты ─────────────
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"
          working-directory: server
      - run: uv sync --frozen
      - run: uv run --frozen ruff check
      - run: uv run --frozen ruff format --check
      - run: uv run --frozen mypy
      - run: uv run --frozen pytest

  # ── Frontend (Vue): lint + типы + тесты ─────────────────────
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
